<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/estilo.css">

    <title>SAT - Grau Araraquara</title>
</head>

<body>
    <header>
        <nav class="d-flex position-relative align-items-center w-100 h-100" id="nav-cabecalho">
                <h4>Sistema de Atendimento Técnico</h4>

            <button class="btn btn-outline-light position-absolute end-0 mt-1">Menu</button>
        </nav>
    </header>
    <main class="container d-flex justify-content-center align-items-center">
        <div class="d-flex justify-content-center w-75 " id="main-btn-box">
            <div class="main-page-button">
                <button class="btn btn-outline-success">Chamados</button>
                <label for="">Gestão de chamados - abertura, reabertura, edição e
                    acompanhamento.</label>
            </div>
            <div class="main-page-button">
                <button class="btn btn-outline-danger">Usuários</button>
                <label for="">Gestão de usuários - relação, cadastro, recuperação de senha.</label>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
